name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install poppler (prebuilt windows binaries)
        id: poppler
        shell: pwsh
        run: |
          # MSYS2(pacman) keyring 이 러너 이미지에서 깨져 다운로드 실패하므로,
          # 사전 빌드된 poppler-windows 바이너리(자체완결 Library/bin)를 직접 받는다.
          $ver = "24.08.0-0"
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v$ver/Release-$ver.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_dist -Force
          $pdftoppm = Get-ChildItem -Path poppler_dist -Recurse -Filter pdftoppm.exe | Select-Object -First 1
          if (-not $pdftoppm) {
            Write-Error "pdftoppm.exe not found in extracted poppler"
            exit 1
          }
          $popplerBin = $pdftoppm.Directory.FullName
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT

      - name: Restore vendor assets
        shell: pwsh
        env:
          DLL_MANIFEST: ${{ secrets.DLL_MANIFEST }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DLL_MANIFEST)) {
            Write-Error "secret DLL_MANIFEST 가 설정되지 않았습니다 (가명→원본 라이브러리 이름 매핑)."
            exit 1
          }
          Set-Content -Path "vendor/.dll_manifest" -Value $env:DLL_MANIFEST -Encoding UTF8
          python scripts/restore_vendor.py

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed `
            --hidden-import=win32print `
            --hidden-import=win32ui `
            --hidden-import=win32api `
            --hidden-import=requests `
            --hidden-import=urllib3 `
            --hidden-import=certifi `
            --hidden-import=charset_normalizer `
            --hidden-import=idna `
            --hidden-import=device_status `
            --collect-all customtkinter `
            --collect-all reportlab `
            --collect-all qrcode `
            --collect-submodules gui `
            --add-data "${{ steps.poppler.outputs.bin }};poppler" `
            --add-data "assets/fonts;assets/fonts" `
            --add-data ".source;.source" `
            --name equip-sync-g `
            main.py

      - name: Rename artifact (버전 포함)
        shell: pwsh
        run: |
          $name = "equip-sync-g-${{ github.ref_name }}.exe"
          Rename-Item -Path "dist/equip-sync-g.exe" -NewName $name
          echo "ARTIFACT=dist/$name" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT }}
