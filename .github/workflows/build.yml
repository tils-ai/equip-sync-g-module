name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: watcher
        run: pip install -r requirements.txt

      - name: Install poppler via MSYS2
        id: poppler
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-poppler
          $popplerBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$popplerBin\pdftoppm.exe")) {
            Write-Error "pdftoppm.exe not found in $popplerBin"
            exit 1
          }
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT

      - name: Build exe
        working-directory: watcher
        run: |
          pyinstaller --onefile --windowed `
            --hidden-import=win32print `
            --hidden-import=win32ui `
            --hidden-import=win32api `
            --collect-all customtkinter `
            --collect-submodules gui `
            --add-data "${{ steps.poppler.outputs.bin }};poppler" `
            --add-data "assets/fonts;assets/fonts" `
            --name gtx4-manager `
            main.py

      - name: Prepare release assets
        working-directory: watcher
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item dist/gtx4-manager.exe release/
          # config.ini는 첫 실행 시 %LOCALAPPDATA%\equip-sync-b-module\에 자동 생성 (spec §11.5)
          Compress-Archive -Path release/* -DestinationPath ../gtx4-manager-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: gtx4-manager-${{ github.ref_name }}.zip
